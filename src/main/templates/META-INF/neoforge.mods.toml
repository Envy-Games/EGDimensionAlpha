# Non-mod-specific properties
modLoader          = "javafml"
loaderVersion      = "${loader_version_range}"
license            = "${mod_license}"
showAsResourcePack = false
showAsDataPack     = false

[[mods]]
modId       = "${mod_id}"
version     = "${mod_version}"
displayName = "${mod_name}"
description = '''${mod_description}'''
authors     = "${mod_authors}"

# Dependencies for ${mod_id}
[[dependencies.${mod_id}]]
modId       = "neoforge"
type        = "required"
versionRange= "${neo_version_range}"
ordering    = "NONE"
side        = "BOTH"

[[dependencies.${mod_id}]]
modId       = "minecraft"
type        = "required"
versionRange= "${minecraft_version_range}"
ordering    = "NONE"
side        = "BOTH"

[[dependencies.${mod_id}]]
modId       = "jei"
type        = "optional"
versionRange= "[19.0.0,)"
ordering    = "AFTER"
side        = "CLIENT"
